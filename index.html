  <div class="hdr"><img class="brand" src="https://foxmarble.com/wp-content/uploads/2025/07/fox-marble-logo-white-v02.svg" alt="Fox Marble"><div class="hmid"><div class="title">Drop-In Hunter</div><div class="sub">SURFACES FIELD TOOL</div></div><div class="count" id="count">...</div></div>

  <div class="view map-view on" id="mapView"><div class="map-ctrl"><div class="row"><div class="search-wrap"><input class="search" id="place" placeholder="Search account or area"><div class="suggest closed" id="suggest"></div></div><button class="mode on" id="mode">All Accounts</button></div><div class="row" id="radii"><button class="chip" data-radius="1">1 mi</button><button class="chip on" data-radius="3">3 mi</button><button class="chip" data-radius="5">5 mi</button><button class="chip" data-radius="10">10 mi</button></div><div class="filters"><button class="chip t1 on" data-tier="T1 Call Today">T1 Hot</button><button class="chip t2 on" data-tier="T2 Email + Call">T2 Warm</button><button class="chip t3 on" data-tier="T3 Branded Email">T3 Cold</button><button class="chip prod-tile" data-product="tile">Tile</button><button class="chip prod-stone" data-product="stone">Stone</button><button class="chip prod-care" data-product="care">StoneCare</button><button class="chip" data-type="GC">GC</button><button class="chip" data-type="Designer">Designer</button><button class="chip" data-type="Architect">Architect</button></div></div><div id="map"></div><div class="zoom"><button onclick="map&&map.zoomIn()" aria-label="Zoom in">+</button><button onclick="map&&map.zoomOut()" aria-label="Zoom out">-</button></div><button class="gps" onclick="useGPS()">Near Me</button><div class="sheet" id="sheet"><div class="sheet-h">Search an account, city, or use Near Me to see nearby accounts</div></div><button class="sheet-tab" id="sheetTab" onclick="expandSheet()">Show List</button></div>

<script>
const PASSWORD='foxstrong';let DATA=[],map,markers,origin=null,radius=3,mode='near',selected=null;const tiers=new Set(['T1 Call Today','T2 Email + Call','T3 Branded Email']);const types=new Set(),products=new Set();
function unlock(e){e.preventDefault();if(document.getElementById('pass').value.trim().toLowerCase()===PASSWORD){sessionStorage.foxFieldAccess='ok';document.body.classList.remove('locked');document.getElementById('gate').classList.add('hide');setTimeout(()=>map&&map.invalidateSize(),80)}else document.getElementById('err').textContent='Wrong password';return false}
if(sessionStorage.foxFieldAccess==='ok'){document.body.classList.remove('locked');document.getElementById('gate').classList.add('hide')}else setTimeout(()=>document.getElementById('pass').focus(),100);
const DATA_URLS=['data_source.html?v=ee0ccc1','https://raw.githubusercontent.com/ericsedelson/fox-hunt-app/main/data_source.html'];loadData();
async function loadData(){const errors=[];for(const url of DATA_URLS){try{const t=await loadText(url),m=t.match(/window\.FOX_DATA\s*=\s*(\[[\s\S]*?\]);/);if(!m)throw Error('No data found');DATA=Function('return '+m[1])();DATA.forEach((r,i)=>r.id=i);boot();return}catch(e){errors.push((url.includes('raw.githubusercontent')?'GitHub raw':'site data')+': '+(e.message||e))}}setSheet('<div class="sheet-h">Data failed to load. Try refresh or check connection. '+esc(errors.join(' | '))+'</div>')}
function loadText(url){return fetch(url,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error('HTTP '+r.status);return r.text()}).catch(()=>new Promise((ok,fail)=>{const x=new XMLHttpRequest();x.open('GET',url,true);x.onload=()=>x.status>=200&&x.status<300?ok(x.responseText):fail(Error('HTTP '+x.status));x.onerror=()=>fail(Error('Network load failed'));x.send()}))}
function boot(){document.getElementById('count').textContent=DATA.length;initMap();renderList();renderCities();bind()}
function bind(){document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>tab(b.dataset.tab));document.querySelectorAll('[data-radius]').forEach(b=>b.onclick=()=>{radius=+b.dataset.radius;document.querySelectorAll('[data-radius]').forEach(x=>x.classList.toggle('on',x===b));if(origin)showNear()});document.querySelectorAll('[data-tier]').forEach(b=>b.onclick=()=>{flip(tiers,b.dataset.tier,b);refreshMap()});document.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{flip(types,b.dataset.type,b);refreshMap()});document.querySelectorAll('[data-product]').forEach(b=>b.onclick=()=>{flip(products,b.dataset.product,b);refreshMap()});document.getElementById('mode').onclick=toggleMode;document.getElementById('place').oninput=debounce(placeSearch,220);document.getElementById('place').onfocus=placeSearch;document.getElementById('huntSearch').oninput=renderList;document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))hideSuggest()})}
function tab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.getElementById(t+'View').classList.add('on');if(t==='map')setTimeout(()=>map.invalidateSize(),60)}
function setSheet(html,cls){const s=document.getElementById('sheet');s.className='sheet '+(cls||'');s.innerHTML=html;document.getElementById('sheetTab')?.classList.remove('on')}
function collapseSheet(label){document.getElementById('sheet').classList.add('closed');const b=document.getElementById('sheetTab');if(b){b.textContent=label||'Show List';b.classList.add('on')}}
function expandSheet(){document.getElementById('sheet').classList.remove('closed');document.getElementById('sheetTab')?.classList.remove('on');setTimeout(()=>map&&map.invalidateSize(),60)}
function sheetHead(text,label){return `<div class="sheet-h"><span>${esc(text)}</span><button class="sh-btn" onclick="collapseSheet('${escAttr(label||'Show List')}')">Hide</button></div>`}
function accountHead(r,d){return `<div class="sheet-h"><div class="grip"></div><div class="sheet-title" onclick="toggleAccountSheet()"><b>${esc(r.account)}</b><span>${esc(r.type||'Unknown')}${r.city?' · '+esc(r.city):''}${d!=null?' · '+(d<1?Math.round(d*10)/10:d.toFixed(1))+' mi':''} · score ${r.score}</span></div><button class="sh-btn" id="accountToggle" onclick="toggleAccountSheet()">More</button><button class="xbtn" onclick="closeAccount()" aria-label="Close account">X</button></div>`}
function initMap(){map=L.map('map',{attributionControl:false,zoomControl:false}).setView([37.75,-122.25],10);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);markers=L.layerGroup().addTo(map);plotAll()}
function filtered(){return DATA.filter(r=>r.lat&&r.lng&&tiers.has(r.tier)&&(!types.size||types.has(r.type))&&productMatch(r))}
function plotAll(){if(!markers)return;markers.clearLayers();const d=filtered();d.slice(0,900).forEach(r=>addMarker(r));if(d.length&&d.length<400)fit(d);setSheet('<div class="sheet-h">'+d.length+' mapped accounts. Search an account, city, or use Near Me for nearby ranking.</div>')}
function addMarker(r,dist){const m=L.marker([r.lat,r.lng],{icon:icon(r,selected===r.id)}).addTo(markers);m.on('click',()=>preview(r,dist,{setArea:true}))}
function icon(r,on){const c=r.tier==='T1 Call Today'?'#22c55e':r.tier==='T2 Email + Call'?'#f59e0b':'#64748b',s=(r.tier==='T1 Call Today'?34:r.tier==='T2 Email + Call'?28:22)+(on?8:0);return L.divIcon({className:'',iconSize:[s,s],iconAnchor:[s/2,s/2],html:`<svg width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">${on?`<circle cx="${s/2}" cy="${s/2}" r="${s/2-2}" fill="none" stroke="white" stroke-width="2.5"/>`:''}<circle cx="${s/2}" cy="${s/2}" r="${s/2-(on?5:2)}" fill="${c}" fill-opacity="${on ? .34 : .18}" stroke="${c}" stroke-width="${on?3:1.5}"/><text x="${s/2}" y="${s/2+4}" text-anchor="middle" font-size="10" font-weight="900" fill="${on?'white':c}">${r.score}</text></svg>`})}
function rankedNear(){if(!origin)return[];return filtered().map(r=>({...r,dist:dist(origin.lat,origin.lng,r.lat,r.lng)})).filter(r=>r.dist<=radius).map(r=>({...r,rankScore:(r.score||0)+Math.max(0,100*(1-r.dist/radius))}))}
function paintNear(){const ranked=rankedNear().sort((a,b)=>b.rankScore-a.rankScore).slice(0,45);markers.clearLayers();ranked.forEach(r=>addMarker(r,r.dist));return ranked}
function showNear(){if(!origin)return;const ranked=rankedNear();const tiersDef=[['T1 Call Today','t1','T1 Hot'],['T2 Email + Call','t2','T2 Warm'],['T3 Branded Email','t3','T3 Cold']];let visible=[];let html=sheetHead('Nearby accounts near '+origin.label+' · '+radius+' mi radius','Show List');tiersDef.forEach(([tier,cls,label])=>{const group=ranked.filter(r=>r.tier===tier).sort((a,b)=>b.rankScore-a.rankScore).slice(0,8);if(!group.length)return;html+=`<div class="tier-h ${cls}">${label} · ${group.length} shown</div>`+group.map((r,i)=>`<div class="near" onclick="showOnMap(${r.id},${r.dist})"><div class="rank">${i+1}</div><div class="ni"><div class="nn">${esc(r.account)}</div><div class="ns">${esc(r.type||'Unknown')} · ${esc(r.city||'')}${productSummary(r)?' · '+esc(productSummary(r)):''}${contactSummary(r)?' · '+esc(contactSummary(r)):''}</div></div><div><div class="score">${r.score}</div><div class="dist">${r.dist<1?(Math.round(r.dist*10)/10):r.dist.toFixed(1)} mi</div></div></div>`).join('');visible=visible.concat(group)});markers.clearLayers();visible.forEach(r=>addMarker(r,r.dist));setSheet(html);if(visible.length)fit(visible);else msg('No accounts match this radius and filter')}
function previewById(id,d){const r=DATA.find(x=>x.id===id);if(r)preview(r,d)}
function showOnMap(id,d){const r=DATA.find(x=>x.id===id);if(!r)return;tab('map');setTimeout(()=>preview(r,d,{setArea:true}),80)}
function preview(r,d,opts={}){selected=r.id;if(r.lat&&r.lng){if(opts.setArea){origin={lat:r.lat,lng:r.lng,label:r.account};mode='near';setModeUI();if(d==null)d=0}paintNear();map.setView([r.lat,r.lng],Math.max(map.getZoom(),14))}const phone=bestPhone(r),email=bestEmail(r),maps=mapsUrl(r),why=[];if(d!=null)why.push(['Distance',(d<1?Math.round(d*10)/10:d.toFixed(1))+' mi']);if(r.openStone)why.push(['Open Stone','$'+fmt(r.openStone)]);if(r.openTile)why.push(['Open Tile','$'+fmt(r.openTile)]);if(r.wonDollars)why.push(['Won','$'+fmt(r.wonDollars)]);setSheet(`${accountHead(r,d)}<div class="account-body"><div class="hero"><div class="hero-top"><div class="bigscore ${tc(r)}">${r.score}</div><div style="min-width:0"><div class="nn">${esc(r.account)}</div><div class="meta">${esc(r.type||'Unknown')}${r.city?' · '+esc(r.city):''}</div>${pills(r)}</div></div></div><div class="actions quick-actions">${maps?`<a class="act map" target="_blank" href="${maps}">Directions</a>`:'<div class="act">No Address</div>'}${phone?`<a class="act call" href="tel:${phone.replace(/\\D/g,'')}">Call</a>`:'<div class="act">No Phone</div>'}${email?`<a class="act mail" href="mailto:${email}">Email</a>`:'<div class="act">No Email</div>'}<button class="act more" onclick="detail(${r.id})">Details</button></div>${accountContactStrip(r)}${r.nextAction?`<div class="next-line"><b>Next:</b> ${esc(r.nextAction)}</div>`:''}${r.address?`<div class="address-line expand-only">${esc(r.address)}</div>`:''}<div class="expand-only">${why.length?'<div class="why">'+why.slice(0,4).map(x=>`<div><b>${esc(x[0])}</b><span>${esc(x[1])}</span></div>`).join('')+'</div>':''}${contactsHtml(r,8)}${origin?'<button class="primary" onclick="showNear()">Nearby List</button>':''}</div></div>`,'account-sheet collapsed')}
function renderList(){const q=(document.getElementById('huntSearch').value||'').toLowerCase();const d=DATA.filter(r=>!q||[r.account,r.city,r.type,r.contact,r.email,r.phone,r.allContacts].join(' ').toLowerCase().includes(q)).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,200);document.getElementById('cards').innerHTML='<div class="bar">'+d.length+' accounts shown · tap an account to show it on the map</div>'+d.map(r=>`<div class="card" onclick="showOnMap(${r.id})"><div class="card-top"><div class="box ${tc(r)}">${r.score}</div><div style="min-width:0"><div class="cn">${esc(r.account)}</div><div class="cm">${esc(r.type||'Unknown')}${r.city?' · '+esc(r.city):''}${contactSummary(r)?' · '+esc(contactSummary(r)):''}</div>${pills(r)}</div></div></div>`).join('')}
function renderCities(){const m={};DATA.forEach(r=>{if(!r.city||!r.lat||!r.lng)return;(m[r.city]??={n:0,lat:0,lng:0,t1:0}).n++;m[r.city].lat+=r.lat;m[r.city].lng+=r.lng;if(r.tier==='T1 Call Today')m[r.city].t1++});document.getElementById('cityCards').innerHTML=Object.entries(m).sort((a,b)=>b[1].n-a[1].n).slice(0,120).map(([c,v])=>`<div class="city" onclick="setOrigin(${v.lat/v.n},${v.lng/v.n},'${escAttr(c)}')"><div class="cn">${esc(c)}</div><div class="cm">${v.n} accounts · ${v.t1} hot</div></div>`).join('')}
function detail(id){const r=DATA.find(x=>x.id===id);if(!r)return;document.getElementById('detailTitle').textContent=r.account;const phone=bestPhone(r),email=bestEmail(r),maps=mapsUrl(r);document.getElementById('detailBody').innerHTML=`<div class="hero"><div class="hero-top"><div class="bigscore ${tc(r)}">${r.score}</div><div><div class="nn">${esc(r.account)}</div><div class="meta">${esc(r.owner||'')}${r.type?' · '+esc(r.type):''}${r.city?'<br>'+esc(r.city):''}</div>${pills(r)}</div></div></div><div class="actions">${maps?`<a class="act map" target="_blank" href="${maps}">Directions</a>`:''}${phone?`<a class="act call" href="tel:${phone.replace(/\\D/g,'')}">Call</a>`:''}${email?`<a class="act mail" href="mailto:${email}">Email</a>`:''}<button class="act more" onclick="closeDetail()">Map</button></div>${contactsHtml(r,12)}${r.nextAction?`<div class="section"><div class="sh">Next Action</div>${esc(r.nextAction)}</div>`:''}<div class="section"><div class="sh">Money & Activity</div>${money(r)}</div>${r.repNotes?`<div class="section"><div class="sh">Rep Notes</div>${esc(r.repNotes)}</div>`:''}`;document.getElementById('detail').classList.add('on')}
function closeDetail(){document.getElementById('detail').classList.remove('on')}function toggleAccountSheet(){const s=document.getElementById('sheet'),b=document.getElementById('accountToggle');if(!s.classList.contains('account-sheet'))return;const closed=s.classList.toggle('collapsed');if(b)b.textContent=closed?'More':'Less';setTimeout(()=>map&&map.invalidateSize(),80)}function setModeUI(){document.getElementById('mode').classList.toggle('on',mode==='near');document.getElementById('mode').textContent=mode==='near'?'All Accounts':'Near Me';document.getElementById('radii').style.display=mode==='near'?'':'none'}function toggleMode(){if(mode==='near'){mode='all';selected=null;setModeUI();plotAll()}else{mode='near';selected=null;setModeUI();useGPS()}}
function closeAccount(){selected=null;origin&&mode==='near'?showNear():plotAll()}
function placeSearch(){const q=document.getElementById('place').value.trim();if(!q){hideSuggest();return}const accountMatches=DATA.filter(r=>r.lat&&r.lng&&r.account&&r.account.toLowerCase().includes(q.toLowerCase())).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,7);if(accountMatches.length){showSuggest(accountMatches);return}hideSuggest();if(q.length<3)return;if(mode!=='near'){mode='near';setModeUI()}const local=cityOrigin(q);if(local){setOrigin(local.lat,local.lng,local.label);return}fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q+', California')).then(r=>r.json()).then(j=>j&&j[0]?setOrigin(+j[0].lat,+j[0].lon,j[0].display_name.split(',')[0]):msg('Location not found')) .catch(()=>msg('Geocoding unavailable'))}
function showSuggest(rows){const box=document.getElementById('suggest');box.classList.remove('closed');box.innerHTML=rows.map(r=>`<div class="sug" onclick="pickAccount(${r.id})"><b>${esc(r.account)}</b><span>${esc(r.type||'Unknown')}${r.city?' · '+esc(r.city):''}${productSummary(r)?' · '+esc(productSummary(r)):''}${contactSummary(r)?' · '+esc(contactSummary(r)):''}</span></div>`).join('')}
function hideSuggest(){const box=document.getElementById('suggest');if(box){box.classList.add('closed');box.innerHTML=''}}
function pickAccount(id){const r=DATA.find(x=>x.id===id);if(!r)return;document.getElementById('place').value=r.account;hideSuggest();showOnMap(id,0)}
function cityOrigin(q){q=q.toLowerCase();let pts=DATA.filter(r=>r.city&&r.lat&&r.lng&&r.city.toLowerCase().includes(q));if(!pts.length)return null;return{lat:avg(pts,'lat'),lng:avg(pts,'lng'),label:pts[0].city}}function setOrigin(lat,lng,label){origin={lat,lng,label};tab('map');if(map)map.setView([lat,lng],13);showNear()}function useGPS(){mode='near';setModeUI();if(!navigator.geolocation){msg('GPS not available');return}msg('Getting current location...');navigator.geolocation.getCurrentPosition(p=>setOrigin(p.coords.latitude,p.coords.longitude,'My Location'),()=>msg('Location access denied'))}function msg(s){setSheet('<div class="sheet-h">'+esc(s)+'</div>')}
function flip(set,val,el){set.has(val)?set.delete(val):set.add(val);el.classList.toggle('on');refreshMap()}function refreshMap(){origin&&mode==='near'?showNear():plotAll()}function fit(d){try{map.fitBounds([[Math.min(...d.map(x=>x.lat)),Math.min(...d.map(x=>x.lng))],[Math.max(...d.map(x=>x.lat)),Math.max(...d.map(x=>x.lng))]],{padding:[70,70],maxZoom:13})}catch(e){}}
function dist(a,b,c,d){const R=3958.8,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,n=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(n),Math.sqrt(1-n))}function avg(a,k){return a.reduce((s,x)=>s+x[k],0)/a.length}function tc(r){return r.tier==='T1 Call Today'?'t1':r.tier==='T2 Email + Call'?'t2':'t3'}function productMatch(r){return !products.size||(products.has('stone')&&r.hasStone)||(products.has('tile')&&r.hasTile)||(products.has('care')&&r.hasCare)}function productSummary(r){return[(r.hasTile?'Tile':''),(r.hasStone?'Stone':''),(r.hasCare?'StoneCare':'')].filter(Boolean).join(', ')}function pills(r){return'<div class="pills">'+(r.hasStone?'<span class="pill stone">Stone</span>':'')+(r.hasTile?'<span class="pill tile">Tile</span>':'')+(r.hasCare?'<span class="pill care">StoneCare</span>':'')+'</div>'}function mapsUrl(r){return r.address?'https://maps.google.com/?q='+encodeURIComponent(r.address):r.city?'https://maps.google.com/?q='+encodeURIComponent(r.account+', '+r.city+', CA'):''}function bestPhone(r){return (r.phone||((r.allContacts||'').match(/[\(]?\d{3}[\)\-\s\.]*\d{3}[\-\s\.]*\d{4}/)||[''])[0]||'')}function bestEmail(r){return r.email||((r.allContacts||'').match(/[\w.+-]+@[\w.-]+\.[a-z]{2,}/i)||[''])[0]||''}function contactSummary(r){const c=parseContacts(r)[0];if(!c)return'';return [c.name,c.phone,c.email].filter(Boolean).slice(0,2).join(' · ')}function previewContact(r){const c=parseContacts(r)[0];if(!c)return'';return `<div class="meta" style="margin:-2px 0 10px"><b>Contact:</b> ${esc([c.name,c.phone,c.email].filter(Boolean).join(' · '))}</div>`}function accountContactStrip(r){const c=parseContacts(r)[0]||{},p=c.phone||bestPhone(r),e=c.email||bestEmail(r),n=c.name||r.contact||'Unknown contact';return `<div class="contact-strip"><div class="avatar">${esc((n||'?')[0]).toUpperCase()}</div><div class="ci"><div class="contact-label">Primary contact</div><div class="cname">${esc(n)}</div><div class="csub">${esc([p,e].filter(Boolean).join(' · ')||'No phone or email')}</div></div></div>`}function parseContacts(r){const out=[],seen=new Set();function add(n,p,e){n=(n||'').trim();p=(p||'').trim();e=(e||'').trim();const k=(n+'|'+p+'|'+e).toLowerCase();if((!n&&!p&&!e)||seen.has(k))return;seen.add(k);out.push({name:n,phone:p,email:e})}if(r.allContacts){r.allContacts.split(';').forEach(entry=>{let n='',p='',e='';entry.split('·').map(x=>x.trim()).filter(Boolean).forEach(x=>{if(x.includes('@'))e=e||x.replace(/[<>]/g,'');else if(/[\d\(\)\-\.\s]{7,}/.test(x)&&/\d{3}/.test(x))p=p||x;else if(x.length>1)n=n||x});add(n,p,e)})}add(r.contact,r.phone,r.email);return out.slice(0,12)}function contactsHtml(r,limit){const cs=parseContacts(r).slice(0,limit);if(!cs.length)return'';return `<div class="section"><div class="sh">Contacts · ${cs.length}</div><div class="contact-list">${cs.map(c=>`<div class="contact"><div class="avatar">${esc((c.name||'?')[0]).toUpperCase()}</div><div class="ci"><div class="cname">${esc(c.name||'Unknown contact')}</div><div class="csub">${esc([c.phone,c.email].filter(Boolean).join(' · ')||'No phone or email')}</div></div><div class="cacts">${c.phone?`<a class="cact call" href="tel:${c.phone.replace(/\D/g,'')}">Call</a>`:''}${c.email?`<a class="cact mail" href="mailto:${esc(c.email)}">Email</a>`:''}</div></div>`).join('')}</div></div>`}function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'K':String(n||0)}function money(r){return[['Won',r.wonDollars],['Open Stone',r.openStone],['Open Tile',r.openTile],['Max Project',r.maxProj]].filter(x=>x[1]).map(x=>'<b>'+x[0]+':</b> $'+fmt(x[1])).join('<br>')+(r.lastActivity?'<br><b>Last active:</b> '+esc(r.lastActivity):'')}function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function escAttr(s){return esc(s).replace(/'/g,'&#39;')}function debounce(f,ms){let t;return()=>{clearTimeout(t);t=setTimeout(f,ms)}}
</script>
