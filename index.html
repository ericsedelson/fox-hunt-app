<style>
*{box-sizing:border-box}html,body{height:100%;margin:0;background:#0d1117;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}button,input{font:inherit}
:root{--bg:#0d1117;--sf:#161b25;--sf2:#1e2535;--bd:#252e42;--terra:#c0613f;--td:#a04e31;--tg:rgba(192,97,63,.16);--t1:#22c55e;--t2:#f59e0b;--t3:#64748b;--blue:#60a5fa;--purple:#c084fc;--green:#34d399;--tx:#e2e8f0;--mut:#94a3b8;--dim:#4b5675;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
body.locked #app{filter:blur(8px);pointer-events:none;user-select:none}.gate{position:fixed;inset:0;z-index:5000;background:radial-gradient(circle at top,#1e2535,#0d1117 60%);display:flex;align-items:center;justify-content:center;padding:22px}.gate.hide{display:none}.gate-card{width:100%;max-width:360px;background:rgba(22,27,37,.96);border:1px solid var(--bd);border-radius:12px;padding:22px;box-shadow:0 20px 60px #0008}.logo{display:inline-flex;background:var(--terra);border-radius:6px;padding:6px 11px;color:white;font-weight:900;letter-spacing:1.4px;font-size:13px}.gate h1{margin:16px 0 6px;font-size:24px}.gate p{margin:0 0 18px;color:var(--mut);font-size:13px;line-height:1.45}.gate input{width:100%;border:1.5px solid var(--bd);background:var(--sf2);color:var(--tx);border-radius:9px;padding:13px 14px;font-size:17px;outline:none}.primary{width:100%;margin-top:10px;background:var(--terra);border:1px solid var(--td);color:white;border-radius:9px;padding:13px;font-weight:850}.err{height:18px;margin-top:10px;color:var(--t2);font-size:12px}
#app{height:100dvh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative;background:var(--bg)}.hdr{padding:calc(var(--st) + 10px) 14px 10px;background:linear-gradient(160deg,#1a2035,#111827);border-bottom:1px solid var(--bd);display:flex;gap:10px;align-items:center;z-index:10}.brand{background:var(--terra);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:900;letter-spacing:1.5px}.hmid{flex:1}.title{font-size:15px;font-weight:800}.sub{font-size:10px;color:var(--dim);letter-spacing:.5px;margin-top:1px}.count{font-size:11px;font-weight:800;color:var(--terra);background:var(--tg);border:1px solid var(--td);border-radius:20px;padding:4px 9px}.tabs{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);z-index:10}.tab{flex:1;border:0;background:transparent;color:var(--dim);padding:10px 0;font-size:11px;font-weight:850;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid transparent}.tab.on{color:var(--terra);border-bottom-color:var(--terra)}
.view{display:none;flex:1;min-height:0}.view.on{display:flex}.map-view{position:relative;flex-direction:column}#map{flex:1;background:#0d1117}.map-ctrl{position:absolute;left:0;right:0;top:10px;z-index:500;padding:0 12px;display:flex;flex-direction:column;gap:6px;pointer-events:none}.map-ctrl>*{pointer-events:auto}.row{display:flex;gap:6px}.search{flex:1;background:rgba(13,17,23,.93);border:1.5px solid var(--bd);border-radius:9px;color:var(--tx);padding:10px 12px;outline:none;backdrop-filter:blur(8px)}.mode,.chip{background:rgba(13,17,23,.92);border:1px solid var(--bd);color:var(--mut);border-radius:20px;padding:8px 10px;font-size:11px;font-weight:850;white-space:nowrap;backdrop-filter:blur(8px)}.mode{border-radius:9px}.mode.on,.chip.on{background:var(--tg);border-color:var(--td);color:var(--terra)}.filters{background:rgba(13,17,23,.88);border:1px solid var(--bd);border-radius:10px;padding:8px;display:flex;gap:5px;flex-wrap:wrap;backdrop-filter:blur(8px)}.chip.t1{color:var(--t1);border-color:rgba(34,197,94,.25)}.chip.t2{color:var(--t2);border-color:rgba(245,158,11,.25)}.chip.t3{color:var(--t3);border-color:rgba(100,116,139,.3)}.chip.prod-stone{color:var(--purple);border-color:rgba(192,132,252,.28)}.chip.prod-tile{color:var(--blue);border-color:rgba(96,165,250,.28)}.chip.prod-care{color:var(--green);border-color:rgba(52,211,153,.28)}
.sheet{position:absolute;left:10px;right:10px;bottom:calc(var(--sb) + 10px);z-index:520;background:rgba(13,17,23,.96);border:1px solid var(--bd);border-radius:14px;max-height:min(42vh,320px);overflow:auto;box-shadow:0 18px 50px #0008;backdrop-filter:blur(12px)}.sheet.preview-sheet{max-height:min(31vh,260px)}.sheet.closed{display:none}.sheet::-webkit-scrollbar{display:none}.sheet-h{position:sticky;top:0;background:rgba(13,17,23,.98);padding:9px 12px;border-bottom:1px solid var(--bd);font-size:10px;font-weight:850;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;z-index:1;display:flex;align-items:center;gap:8px;justify-content:space-between}.sh-btn{border:1px solid var(--bd);background:var(--sf2);color:var(--terra);border-radius:8px;padding:5px 8px;font-size:10px;font-weight:900;text-transform:none;letter-spacing:0}.sheet-tab{display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:calc(var(--sb) + 12px);z-index:530;border:1px solid var(--td);background:rgba(13,17,23,.96);color:var(--terra);border-radius:999px;padding:10px 14px;font-size:12px;font-weight:900;box-shadow:0 10px 32px #0008}.sheet-tab.on{display:block}.near{display:flex;align-items:center;gap:9px;padding:12px;border-bottom:1px solid var(--bd)}.near:last-child{border-bottom:0}.rank{width:17px;color:var(--dim);font-size:11px;font-weight:900}.ni{flex:1;min-width:0}.nn{font-size:14px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ns{font-size:11px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{text-align:right;font-size:14px;font-weight:900}.dist{font-size:10px;color:var(--terra);font-weight:850;margin-top:2px}
.preview{padding:13px}.hero{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:10px}.hero-top{display:flex;gap:12px;align-items:center}.bigscore{font-size:39px;font-weight:950;line-height:1}.bigscore.t1{color:var(--t1)}.bigscore.t2{color:var(--t2)}.bigscore.t3{color:var(--t3)}.meta{font-size:12px;color:var(--dim);line-height:1.45;margin-top:4px}.pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}.pill{font-size:10px;font-weight:850;border-radius:4px;padding:3px 7px}.tile{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.25)}.stone{background:rgba(192,132,252,.1);color:var(--purple);border:1px solid rgba(192,132,252,.25)}.care{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.25)}.why{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}.why div{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:8px}.why b{display:block;font-size:9px;color:var(--dim);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px}.why span{display:block;font-size:12px;color:var(--mut);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.act{display:flex;align-items:center;justify-content:center;border-radius:10px;padding:13px 10px;text-decoration:none;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:14px;font-weight:900}.act.map{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.28);color:var(--blue)}.act.call{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.28);color:var(--green)}.act.mail{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.22);color:var(--blue)}.act.more{background:var(--tg);border-color:var(--td);color:var(--terra)}
.gps{position:absolute;right:12px;bottom:calc(var(--sb) + 284px);z-index:510;width:42px;height:42px;border-radius:10px;border:1.5px solid var(--bd);background:rgba(13,17,23,.92);color:var(--tx);font-weight:900}.list,.cities{flex-direction:column;overflow:auto;-webkit-overflow-scrolling:touch}.bar{padding:8px 14px;background:var(--bg);color:var(--dim);font-size:11px;font-weight:850;position:sticky;top:0;z-index:2}.card,.city{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 14px}.card-top{display:flex;gap:9px}.box{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:950;border:1.5px solid}.box.t1{color:var(--t1);background:rgba(34,197,94,.09);border-color:rgba(34,197,94,.28)}.box.t2{color:var(--t2);background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.28)}.box.t3{color:var(--t3);background:rgba(100,116,139,.08);border-color:rgba(100,116,139,.22)}.cn{font-size:14px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cm{font-size:11px;color:var(--dim);margin-top:3px}.tier-h{padding:9px 12px 5px;font-size:10px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:var(--dim)}.tier-h.t1{color:var(--t1)}.tier-h.t2{color:var(--t2)}.tier-h.t3{color:var(--t3)}.contact-list{display:flex;flex-direction:column;gap:8px}.contact{display:flex;align-items:center;gap:8px;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:9px}.avatar{width:28px;height:28px;border-radius:7px;background:var(--sf);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--mut);flex:0 0 auto}.ci{flex:1;min-width:0}.cname{font-size:13px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.csub{font-size:11px;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cacts{display:flex;gap:5px}.cact{min-width:42px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:11px;font-weight:900;padding:0 7px}.cact.call{background:rgba(52,211,153,.12);color:var(--green)}.cact.mail{background:rgba(96,165,250,.12);color:var(--blue)}.detail{position:absolute;inset:0;background:var(--bg);z-index:1000;transform:translateX(100%);transition:.25s;display:flex;flex-direction:column}.detail.on{transform:translateX(0)}.dh{padding:calc(var(--st) + 10px) 14px 12px;background:linear-gradient(160deg,#1a2035,#111827);border-bottom:1px solid var(--bd);display:flex;gap:10px}.back{border:0;background:transparent;color:var(--terra);font-weight:850}.dt{flex:1;min-width:0;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.db{overflow:auto;padding:14px;padding-bottom:calc(var(--sb) + 14px)}.section{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px}.sh{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-weight:850;margin-bottom:8px}.leaflet-tile-pane{filter:brightness(.86) saturate(.72)}.leaflet-popup-content-wrapper{background:var(--sf);border:1px solid var(--bd);color:var(--tx);border-radius:10px}.leaflet-popup-tip{background:var(--sf)}
</style>
</head>
<body class="locked">
<div class="gate" id="gate"><form class="gate-card" onsubmit="return unlock(event)"><div class="logo">FOX</div><h1>Field Access</h1><p>Enter the team password to open the Drop-In Hunter.</p><input id="pass" type="password" placeholder="Password"><button class="primary">Open App</button><div class="err" id="err"></div></form></div>
<div id="app">
  <div class="hdr"><div class="brand">FOX</div><div class="hmid"><div class="title">Drop-In Hunter</div><div class="sub">SURFACES FIELD TOOL</div></div><div class="count" id="count">...</div></div>
  <div class="tabs"><button class="tab on" data-tab="map">Map</button><button class="tab" data-tab="hunt">Hunt</button><button class="tab" data-tab="cities">Cities</button></div>
  <div class="view map-view on" id="mapView"><div class="map-ctrl"><div class="row"><input class="search" id="place" placeholder="Where are you heading?"><button class="mode on" id="mode">All Accounts</button></div><div class="row" id="radii"><button class="chip" data-radius="1">1 mi</button><button class="chip on" data-radius="3">3 mi</button><button class="chip" data-radius="5">5 mi</button><button class="chip" data-radius="10">10 mi</button></div><div class="filters"><button class="chip t1 on" data-tier="T1 Call Today">T1 Hot</button><button class="chip t2 on" data-tier="T2 Email + Call">T2 Warm</button><button class="chip t3 on" data-tier="T3 Branded Email">T3 Cold</button><button class="chip prod-tile" data-product="tile">Tile</button><button class="chip prod-stone" data-product="stone">Stone</button><button class="chip prod-care" data-product="care">StoneCare</button><button class="chip" data-type="GC">GC</button><button class="chip" data-type="Designer">Designer</button><button class="chip" data-type="Architect">Architect</button></div></div><div id="map"></div><button class="gps" onclick="useGPS()">GPS</button><div class="sheet" id="sheet"><div class="sheet-h">Use GPS or search a city/neighborhood to see nearby accounts</div></div><button class="sheet-tab" id="sheetTab" onclick="expandSheet()">Show List</button></div>
  <div class="view list" id="huntView"><div class="bar"><input class="search" id="huntSearch" placeholder="Account, city, contact"></div><div id="cards"></div></div>
  <div class="view cities" id="citiesView"><div class="bar">Tap a city to show nearby accounts on the map</div><div id="cityCards"></div></div>
  <div class="detail" id="detail"><div class="dh"><button class="back" onclick="closeDetail()">Back</button><div class="dt" id="detailTitle"></div></div><div class="db" id="detailBody"></div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const PASSWORD='foxstrong';let DATA=[],map,markers,origin=null,radius=3,mode='near',selected=null;const tiers=new Set(['T1 Call Today','T2 Email + Call','T3 Branded Email']);const types=new Set(),products=new Set();
function unlock(e){e.preventDefault();if(document.getElementById('pass').value.trim().toLowerCase()===PASSWORD){sessionStorage.foxFieldAccess='ok';document.body.classList.remove('locked');document.getElementById('gate').classList.add('hide');setTimeout(()=>map&&map.invalidateSize(),80)}else document.getElementById('err').textContent='Wrong password';return false}
if(sessionStorage.foxFieldAccess==='ok'){document.body.classList.remove('locked');document.getElementById('gate').classList.add('hide')}else setTimeout(()=>document.getElementById('pass').focus(),100);
const DATA_URLS=['data_source.html?v=ee0ccc1','https://raw.githubusercontent.com/ericsedelson/fox-hunt-app/main/data_source.html'];loadData();
async function loadData(){const errors=[];for(const url of DATA_URLS){try{const t=await loadText(url),m=t.match(/window\.FOX_DATA\s*=\s*(\[[\s\S]*?\]);/);if(!m)throw Error('No data found');DATA=Function('return '+m[1])();DATA.forEach((r,i)=>r.id=i);boot();return}catch(e){errors.push((url.includes('raw.githubusercontent')?'GitHub raw':'site data')+': '+(e.message||e))}}setSheet('<div class="sheet-h">Data failed to load. Try refresh or check connection. '+esc(errors.join(' | '))+'</div>')}
function loadText(url){return fetch(url,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error('HTTP '+r.status);return r.text()}).catch(()=>new Promise((ok,fail)=>{const x=new XMLHttpRequest();x.open('GET',url,true);x.onload=()=>x.status>=200&&x.status<300?ok(x.responseText):fail(Error('HTTP '+x.status));x.onerror=()=>fail(Error('Network load failed'));x.send()}))}
function boot(){document.getElementById('count').textContent=DATA.length;initMap();renderList();renderCities();bind()}
function bind(){document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>tab(b.dataset.tab));document.querySelectorAll('[data-radius]').forEach(b=>b.onclick=()=>{radius=+b.dataset.radius;document.querySelectorAll('[data-radius]').forEach(x=>x.classList.toggle('on',x===b));if(origin)showNear()});document.querySelectorAll('[data-tier]').forEach(b=>b.onclick=()=>{flip(tiers,b.dataset.tier,b);refreshMap()});document.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{flip(types,b.dataset.type,b);refreshMap()});document.querySelectorAll('[data-product]').forEach(b=>b.onclick=()=>{flip(products,b.dataset.product,b);refreshMap()});document.getElementById('mode').onclick=toggleMode;document.getElementById('place').oninput=debounce(placeSearch,450);document.getElementById('huntSearch').oninput=renderList}
function tab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));document.getElementById(t+'View').classList.add('on');if(t==='map')setTimeout(()=>map.invalidateSize(),60)}
function setSheet(html,cls){const s=document.getElementById('sheet');s.className='sheet '+(cls||'');s.innerHTML=html;document.getElementById('sheetTab')?.classList.remove('on')}
function collapseSheet(label){document.getElementById('sheet').classList.add('closed');const b=document.getElementById('sheetTab');if(b){b.textContent=label||'Show List';b.classList.add('on')}}
function expandSheet(){document.getElementById('sheet').classList.remove('closed');document.getElementById('sheetTab')?.classList.remove('on');setTimeout(()=>map&&map.invalidateSize(),60)}
function sheetHead(text,label){return `<div class="sheet-h"><span>${esc(text)}</span><button class="sh-btn" onclick="collapseSheet('${escAttr(label||'Show List')}')">Hide</button></div>`}
function initMap(){map=L.map('map',{attributionControl:false,zoomControl:false}).setView([37.75,-122.25],10);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);markers=L.layerGroup().addTo(map);plotAll()}
function filtered(){return DATA.filter(r=>r.lat&&r.lng&&tiers.has(r.tier)&&(!types.size||types.has(r.type))&&productMatch(r))}
function plotAll(){if(!markers)return;markers.clearLayers();const d=filtered();d.slice(0,900).forEach(r=>addMarker(r));if(d.length&&d.length<400)fit(d);setSheet('<div class="sheet-h">'+d.length+' mapped accounts. Search a place or use GPS for nearby ranking.</div>')}
function addMarker(r,dist){const m=L.marker([r.lat,r.lng],{icon:icon(r,selected===r.id)}).addTo(markers);m.on('click',()=>preview(r,dist))}
function icon(r,on){const c=r.tier==='T1 Call Today'?'#22c55e':r.tier==='T2 Email + Call'?'#f59e0b':'#64748b',s=(r.tier==='T1 Call Today'?34:r.tier==='T2 Email + Call'?28:22)+(on?8:0);return L.divIcon({className:'',iconSize:[s,s],iconAnchor:[s/2,s/2],html:`<svg width="${s}" height="${s}" xmlns="http://www.w3.org/2000/svg">${on?`<circle cx="${s/2}" cy="${s/2}" r="${s/2-2}" fill="none" stroke="white" stroke-width="2.5"/>`:''}<circle cx="${s/2}" cy="${s/2}" r="${s/2-(on?5:2)}" fill="${c}" fill-opacity="${on ? .34 : .18}" stroke="${c}" stroke-width="${on?3:1.5}"/><text x="${s/2}" y="${s/2+4}" text-anchor="middle" font-size="10" font-weight="900" fill="${on?'white':c}">${r.score}</text></svg>`})}
function showNear(){if(!origin)return;const ranked=filtered().map(r=>({...r,dist:dist(origin.lat,origin.lng,r.lat,r.lng)})).filter(r=>r.dist<=radius).map(r=>({...r,rankScore:(r.score||0)+Math.max(0,100*(1-r.dist/radius))}));const tiersDef=[['T1 Call Today','t1','T1 Hot'],['T2 Email + Call','t2','T2 Warm'],['T3 Branded Email','t3','T3 Cold']];let visible=[];let html=sheetHead('Nearby accounts near '+origin.label+' · '+radius+' mi radius','Show List');tiersDef.forEach(([tier,cls,label])=>{const group=ranked.filter(r=>r.tier===tier).sort((a,b)=>b.rankScore-a.rankScore).slice(0,8);if(!group.length)return;html+=`<div class="tier-h ${cls}">${label} · ${group.length} shown</div>`+group.map((r,i)=>`<div class="near" onclick="showOnMap(${r.id},${r.dist})"><div class="rank">${i+1}</div><div class="ni"><div class="nn">${esc(r.account)}</div><div class="ns">${esc(r.type||'Unknown')} · ${esc(r.city||'')}${productSummary(r)?' · '+esc(productSummary(r)):''}${contactSummary(r)?' · '+esc(contactSummary(r)):''}</div></div><div><div class="score">${r.score}</div><div class="dist">${r.dist<1?(Math.round(r.dist*10)/10):r.dist.toFixed(1)} mi</div></div></div>`).join('');visible=visible.concat(group)});markers.clearLayers();visible.forEach(r=>addMarker(r,r.dist));setSheet(html);if(visible.length)fit(visible);else msg('No accounts match this radius and filter')}
function previewById(id,d){const r=DATA.find(x=>x.id===id);if(r)preview(r,d)}
function showOnMap(id,d){const r=DATA.find(x=>x.id===id);if(!r)return;tab('map');setTimeout(()=>preview(r,d),80)}
function preview(r,d){selected=r.id;if(r.lat&&r.lng){map.setView([r.lat,r.lng],Math.max(map.getZoom(),14));markers.clearLayers();addMarker(r,d)}const phone=bestPhone(r),email=bestEmail(r),maps=mapsUrl(r),why=[];if(d!=null)why.push(['Distance',(d<1?Math.round(d*10)/10:d.toFixed(1))+' mi']);if(r.nextAction)why.push(['Action',r.nextAction]);if(r.openStone)why.push(['Open Stone','$'+fmt(r.openStone)]);if(r.openTile)why.push(['Open Tile','$'+fmt(r.openTile)]);if(r.wonDollars)why.push(['Won','$'+fmt(r.wonDollars)]);setSheet(`${sheetHead('Selected account · score '+r.score,'Show Account')}<div class="preview"><div class="hero"><div class="hero-top"><div class="bigscore ${tc(r)}">${r.score}</div><div style="min-width:0"><div class="nn">${esc(r.account)}</div><div class="meta">${esc(r.type||'Unknown')}${r.city?' · '+esc(r.city):''}</div>${pills(r)}</div></div>${why.length?'<div class="why">'+why.slice(0,2).map(x=>`<div><b>${esc(x[0])}</b><span>${esc(x[1])}</span></div>`).join('')+'</div>':''}</div>${previewContact(r)}<div class="actions">${maps?`<a class="act map" target="_blank" href="${maps}">Directions</a>`:'<div class="act">No Address</div>'}${phone?`<a class="act call" href="tel:${phone.replace(/\\D/g,'')}">Call</a>`:'<div class="act">No Phone</div>'}${email?`<a class="act mail" href="mailto:${email}">Email</a>`:'<div class="act">No Email</div>'}<button class="act more" onclick="detail(${r.id})">Details</button></div>${origin?'<button class="primary" onclick="showNear()">Nearby List</button>':''}</div>`,'preview-sheet')}
function renderList(){const q=(document.getElementById('huntSearch').value||'').toLowerCase();const d=DATA.filter(r=>!q||[r.account,r.city,r.type,r.contact,r.email,r.phone,r.allContacts].join(' ').toLowerCase().includes(q)).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,200);document.getElementById('cards').innerHTML='<div class="bar">'+d.length+' accounts shown · tap an account to show it on the map</div>'+d.map(r=>`<div class="card" onclick="showOnMap(${r.id})"><div class="card-top"><div class="box ${tc(r)}">${r.score}</div><div style="min-width:0"><div class="cn">${esc(r.account)}</div><div class="cm">${esc(r.type||'Unknown')}${r.city?' · '+esc(r.city):''}${contactSummary(r)?' · '+esc(contactSummary(r)):''}</div>${pills(r)}</div></div></div>`).join('')}
function renderCities(){const m={};DATA.forEach(r=>{if(!r.city||!r.lat||!r.lng)return;(m[r.city]??={n:0,lat:0,lng:0,t1:0}).n++;m[r.city].lat+=r.lat;m[r.city].lng+=r.lng;if(r.tier==='T1 Call Today')m[r.city].t1++});document.getElementById('cityCards').innerHTML=Object.entries(m).sort((a,b)=>b[1].n-a[1].n).slice(0,120).map(([c,v])=>`<div class="city" onclick="setOrigin(${v.lat/v.n},${v.lng/v.n},'${escAttr(c)}')"><div class="cn">${esc(c)}</div><div class="cm">${v.n} accounts · ${v.t1} hot</div></div>`).join('')}
function detail(id){const r=DATA.find(x=>x.id===id);if(!r)return;document.getElementById('detailTitle').textContent=r.account;const phone=bestPhone(r),email=bestEmail(r),maps=mapsUrl(r);document.getElementById('detailBody').innerHTML=`<div class="hero"><div class="hero-top"><div class="bigscore ${tc(r)}">${r.score}</div><div><div class="nn">${esc(r.account)}</div><div class="meta">${esc(r.owner||'')}${r.type?' · '+esc(r.type):''}${r.city?'<br>'+esc(r.city):''}</div>${pills(r)}</div></div></div><div class="actions">${maps?`<a class="act map" target="_blank" href="${maps}">Directions</a>`:''}${phone?`<a class="act call" href="tel:${phone.replace(/\\D/g,'')}">Call</a>`:''}${email?`<a class="act mail" href="mailto:${email}">Email</a>`:''}<button class="act more" onclick="closeDetail()">Map</button></div>${contactsHtml(r,12)}${r.nextAction?`<div class="section"><div class="sh">Next Action</div>${esc(r.nextAction)}</div>`:''}<div class="section"><div class="sh">Money & Activity</div>${money(r)}</div>${r.repNotes?`<div class="section"><div class="sh">Rep Notes</div>${esc(r.repNotes)}</div>`:''}`;document.getElementById('detail').classList.add('on')}
function closeDetail(){document.getElementById('detail').classList.remove('on')}function toggleMode(){mode=mode==='near'?'all':'near';document.getElementById('mode').classList.toggle('on',mode==='near');document.getElementById('mode').textContent=mode==='near'?'All Accounts':'Near Me';document.getElementById('radii').style.display=mode==='near'?'':'none';mode==='near'?(origin?showNear():setSheet('<div class="sheet-h">Use GPS or search a city/neighborhood to see nearby accounts</div>')):plotAll()}
function placeSearch(){const q=document.getElementById('place').value.trim();if(!q)return;if(mode!=='near')toggleMode();const local=cityOrigin(q);if(local){setOrigin(local.lat,local.lng,local.label);return}fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q+', California')).then(r=>r.json()).then(j=>j&&j[0]?setOrigin(+j[0].lat,+j[0].lon,j[0].display_name.split(',')[0]):msg('Location not found')) .catch(()=>msg('Geocoding unavailable'))}
function cityOrigin(q){q=q.toLowerCase();let pts=DATA.filter(r=>r.city&&r.lat&&r.lng&&r.city.toLowerCase().includes(q));if(!pts.length)return null;return{lat:avg(pts,'lat'),lng:avg(pts,'lng'),label:pts[0].city}}function setOrigin(lat,lng,label){origin={lat,lng,label};tab('map');if(map)map.setView([lat,lng],13);showNear()}function useGPS(){navigator.geolocation?navigator.geolocation.getCurrentPosition(p=>setOrigin(p.coords.latitude,p.coords.longitude,'My Location'),()=>msg('Location access denied')):msg('GPS not available')}function msg(s){setSheet('<div class="sheet-h">'+esc(s)+'</div>')}
function flip(set,val,el){set.has(val)?set.delete(val):set.add(val);el.classList.toggle('on');refreshMap()}function refreshMap(){origin&&mode==='near'?showNear():plotAll()}function fit(d){try{map.fitBounds([[Math.min(...d.map(x=>x.lat)),Math.min(...d.map(x=>x.lng))],[Math.max(...d.map(x=>x.lat)),Math.max(...d.map(x=>x.lng))]],{padding:[70,70],maxZoom:13})}catch(e){}}
function dist(a,b,c,d){const R=3958.8,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,n=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(n),Math.sqrt(1-n))}function avg(a,k){return a.reduce((s,x)=>s+x[k],0)/a.length}function tc(r){return r.tier==='T1 Call Today'?'t1':r.tier==='T2 Email + Call'?'t2':'t3'}function productMatch(r){return !products.size||(products.has('stone')&&r.hasStone)||(products.has('tile')&&r.hasTile)||(products.has('care')&&r.hasCare)}function productSummary(r){return[(r.hasTile?'Tile':''),(r.hasStone?'Stone':''),(r.hasCare?'StoneCare':'')].filter(Boolean).join(', ')}function pills(r){return'<div class="pills">'+(r.hasStone?'<span class="pill stone">Stone</span>':'')+(r.hasTile?'<span class="pill tile">Tile</span>':'')+(r.hasCare?'<span class="pill care">StoneCare</span>':'')+'</div>'}function mapsUrl(r){return r.address?'https://maps.google.com/?q='+encodeURIComponent(r.address):r.city?'https://maps.google.com/?q='+encodeURIComponent(r.account+', '+r.city+', CA'):''}function bestPhone(r){return (r.phone||((r.allContacts||'').match(/[\(]?\d{3}[\)\-\s\.]*\d{3}[\-\s\.]*\d{4}/)||[''])[0]||'')}function bestEmail(r){return r.email||((r.allContacts||'').match(/[\w.+-]+@[\w.-]+\.[a-z]{2,}/i)||[''])[0]||''}function contactSummary(r){const c=parseContacts(r)[0];if(!c)return'';return [c.name,c.phone,c.email].filter(Boolean).slice(0,2).join(' · ')}function previewContact(r){const c=parseContacts(r)[0];if(!c)return'';return `<div class="meta" style="margin:-2px 0 10px"><b>Contact:</b> ${esc([c.name,c.phone,c.email].filter(Boolean).join(' · '))}</div>`}function parseContacts(r){const out=[],seen=new Set();function add(n,p,e){n=(n||'').trim();p=(p||'').trim();e=(e||'').trim();const k=(n+'|'+p+'|'+e).toLowerCase();if((!n&&!p&&!e)||seen.has(k))return;seen.add(k);out.push({name:n,phone:p,email:e})}if(r.allContacts){r.allContacts.split(';').forEach(entry=>{let n='',p='',e='';entry.split('·').map(x=>x.trim()).filter(Boolean).forEach(x=>{if(x.includes('@'))e=e||x.replace(/[<>]/g,'');else if(/[\d\(\)\-\.\s]{7,}/.test(x)&&/\d{3}/.test(x))p=p||x;else if(x.length>1)n=n||x});add(n,p,e)})}add(r.contact,r.phone,r.email);return out.slice(0,12)}function contactsHtml(r,limit){const cs=parseContacts(r).slice(0,limit);if(!cs.length)return'';return `<div class="section"><div class="sh">Contacts · ${cs.length}</div><div class="contact-list">${cs.map(c=>`<div class="contact"><div class="avatar">${esc((c.name||'?')[0]).toUpperCase()}</div><div class="ci"><div class="cname">${esc(c.name||'Unknown contact')}</div><div class="csub">${esc([c.phone,c.email].filter(Boolean).join(' · ')||'No phone or email')}</div></div><div class="cacts">${c.phone?`<a class="cact call" href="tel:${c.phone.replace(/\D/g,'')}">Call</a>`:''}${c.email?`<a class="cact mail" href="mailto:${esc(c.email)}">Email</a>`:''}</div></div>`).join('')}</div></div>`}function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'K':String(n||0)}function money(r){return[['Won',r.wonDollars],['Open Stone',r.openStone],['Open Tile',r.openTile],['Max Project',r.maxProj]].filter(x=>x[1]).map(x=>'<b>'+x[0]+':</b> $'+fmt(x[1])).join('<br>')+(r.lastActivity?'<br><b>Last active:</b> '+esc(r.lastActivity):'')}function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function escAttr(s){return esc(s).replace(/'/g,'&#39;')}function debounce(f,ms){let t;return()=>{clearTimeout(t);t=setTimeout(f,ms)}}
</script>
